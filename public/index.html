<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Viral Video</title>

    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- PaidAdz -->
    <script
        src='//whephiwums.com/sdk.js'
        data-zone='11007747'
        data-sdk='show_11007747'>
    </script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *{
            font-family:'Inter',sans-serif;
            -webkit-tap-highlight-color:transparent;
        }

        body{
            background:#0F172A;
            overflow-x:hidden;
            color:white;
        }

        .blob{
            position:fixed;
            border-radius:9999px;
            filter:blur(80px);
            opacity:.4;
            z-index:0;
            animation:float 8s infinite ease-in-out;
        }

        .blob-1{
            width:300px;
            height:300px;
            background:#7C3AED;
            top:-50px;
            left:-50px;
        }

        .blob-2{
            width:250px;
            height:250px;
            background:#3B82F6;
            right:-50px;
            bottom:20%;
            animation-delay:2s;
        }

        .blob-3{
            width:220px;
            height:220px;
            background:#9333EA;
            top:40%;
            left:30%;
            animation-delay:4s;
        }

        @keyframes float{
            0%,100%{
                transform:translate(0,0) scale(1);
            }
            33%{
                transform:translate(30px,-20px) scale(1.1);
            }
            66%{
                transform:translate(-20px,20px) scale(.9);
            }
        }

        .glass{
            background:rgba(30,41,59,.7);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,.08);
        }

        .gradient-text{
            background:linear-gradient(135deg,#8B5CF6,#3B82F6);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        #loading-screen{
            position:fixed;
            inset:0;
            z-index:999;
            background:#0F172A;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            transition:.4s;
        }

        #loading-screen.hide{
            opacity:0;
            visibility:hidden;
        }

        .loader{
            width:120px;
            height:6px;
            border-radius:999px;
            overflow:hidden;
            background:rgba(255,255,255,.1);
            margin-top:20px;
        }

        .loader-bar{
            height:100%;
            width:0%;
            background:linear-gradient(90deg,#8B5CF6,#3B82F6);
            animation:load 2s infinite ease-in-out;
        }

        @keyframes load{
            0%{
                width:0%;
            }
            50%{
                width:100%;
            }
            100%{
                width:0%;
                margin-left:100%;
            }
        }

        .page{
            display:none;
            animation:fade .25s ease;
        }

        .page.active{
            display:block;
        }

        @keyframes fade{
            from{
                opacity:0;
                transform:translateY(8px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .toast{
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            background:#10B981;
            padding:12px 20px;
            border-radius:14px;
            z-index:1000;
            opacity:0;
            transition:.3s;
            font-size:14px;
            font-weight:600;
        }

        .toast.show{
            opacity:1;
        }

        .modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.7);
            z-index:200;
            display:none;
            align-items:center;
            justify-content:center;
            padding:16px;
        }

        .modal.show{
            display:flex;
        }

        .progress-fill{
            transition:.4s;
        }

        .skeleton{
            background:linear-gradient(
                90deg,
                rgba(255,255,255,.05) 25%,
                rgba(255,255,255,.1) 50%,
                rgba(255,255,255,.05) 75%
            );

            background-size:200% 100%;
            animation:skeleton 1.5s infinite;
            border-radius:18px;
        }

        @keyframes skeleton{
            0%{
                background-position:200% 0;
            }
            100%{
                background-position:-200% 0;
            }
        }
    </style>
</head>

<body class="min-h-screen pb-24">

    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Loading -->
    <div id="loading-screen">
        <div class="flex items-center gap-3">
            <h1 class="text-3xl font-extrabold gradient-text">
                Viral Video
            </h1>

            <img
                id="load-avatar"
                class="w-10 h-10 rounded-full border-2 border-purple-500 hidden"
            />
        </div>

        <div class="loader">
            <div class="loader-bar"></div>
        </div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-50 glass p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">

            <img
                id="header-avatar"
                class="w-10 h-10 rounded-full hidden border border-slate-700"
            />

            <div>
                <h1 class="font-bold text-lg gradient-text leading-none">
                    Viral Video
                </h1>

                <p
                    id="header-username"
                    class="text-xs text-slate-400 mt-1"
                >
                    Welcome Back
                </p>
            </div>
        </div>

        <div
            id="admin-badge"
            class="hidden bg-purple-600 text-xs px-3 py-1 rounded-full font-bold"
        >
            Admin
        </div>
    </header>

    <!-- Main -->
    <main class="relative z-10 px-4 pt-4">

        <!-- Videos -->
        <section id="page-videos" class="page active">

            <h2 class="text-xl font-bold mb-4">
                Trending Videos
            </h2>

            <div id="videos-container" class="space-y-4">

                <div class="skeleton h-52"></div>
                <div class="skeleton h-52"></div>

            </div>
        </section>

        <!-- Tasks -->
        <section id="page-tasks" class="page">

            <h2 class="text-xl font-bold mb-4">
                Earn Unlocks
            </h2>

            <div id="tasks-container" class="space-y-4">

                <div class="skeleton h-24"></div>
                <div class="skeleton h-24"></div>

            </div>
        </section>

        <!-- Admin -->
        <section id="page-admin" class="page hidden">

            <div class="flex items-center justify-between mb-5">
                <h2 class="text-xl font-bold">
                    Admin Dashboard
                </h2>

                <button
                    onclick="openVideoModal()"
                    class="bg-purple-600 px-4 py-2 rounded-xl text-sm font-semibold"
                >
                    + Add Video
                </button>
            </div>

            <div id="admin-videos-list" class="space-y-3"></div>

        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 glass">

        <div class="flex justify-around py-3">

            <button
                id="tab-videos"
                onclick="switchTab('videos')"
                class="flex flex-col items-center text-purple-400"
            >
                <span>🎬</span>
                <span class="text-xs mt-1 font-semibold">
                    Videos
                </span>
            </button>

            <button
                id="tab-tasks"
                onclick="switchTab('tasks')"
                class="flex flex-col items-center text-slate-400"
            >
                <span>📋</span>
                <span class="text-xs mt-1 font-semibold">
                    Tasks
                </span>
            </button>

        </div>
    </nav>

    <!-- Toast -->
    <div id="toast" class="toast">
        Success
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="modal">

        <div class="glass rounded-3xl p-5 w-full max-w-sm">

            <h3 class="font-bold text-lg mb-4">
                Add Video
            </h3>

            <div class="space-y-3">

                <input
                    id="vm-title"
                    type="text"
                    placeholder="Video Title"
                    class="w-full bg-slate-800/60 rounded-xl p-3 outline-none text-sm"
                >

                <input
                    id="vm-img"
                    type="text"
                    placeholder="Image URL"
                    class="w-full bg-slate-800/60 rounded-xl p-3 outline-none text-sm"
                >

                <input
                    id="vm-url"
                    type="text"
                    placeholder="Video URL"
                    class="w-full bg-slate-800/60 rounded-xl p-3 outline-none text-sm"
                >

                <input
                    id="vm-ads"
                    type="number"
                    placeholder="Ads Required"
                    class="w-full bg-slate-800/60 rounded-xl p-3 outline-none text-sm"
                >
            </div>

            <div class="flex gap-2 mt-5">

                <button
                    onclick="closeVideoModal()"
                    class="flex-1 bg-slate-700 py-3 rounded-xl font-semibold text-sm"
                >
                    Cancel
                </button>

                <button
                    onclick="saveVideo()"
                    class="flex-1 bg-purple-600 py-3 rounded-xl font-semibold text-sm"
                >
                    Save
                </button>

            </div>
        </div>
    </div>

    <script>

        // Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // User
        const user = tg.initDataUnsafe.user;

        // Admin
        const ADMIN_IDS = [6040791692];
        let isAdmin = false;

        // Storage
        let adProgress =
            JSON.parse(
                localStorage.getItem('adProgress') || '{}'
            );

        // Demo Data
        let videos = [
            {
                id:1,
                unique_id:'abc123',
                title:'Amazing Nature Video',
                image_url:'https://picsum.photos/600/400?1',
                video_url:'https://www.w3schools.com/html/mov_bbb.mp4',
                ads_required:5
            },
            {
                id:2,
                unique_id:'abc456',
                title:'Viral Trending Clip',
                image_url:'https://picsum.photos/600/400?2',
                video_url:'https://www.w3schools.com/html/movie.mp4',
                ads_required:3
            }
        ];

        let tasks = [
            {
                id:1,
                title:'Join Telegram Channel',
                image_url:'https://picsum.photos/200/200?3',
                redirect_url:'https://t.me/PaidAdzBot'
            }
        ];

        // Init
        window.onload = () => {

            setupUser();

            setTimeout(() => {

                document
                    .getElementById('loading-screen')
                    .classList
                    .add('hide');

                loadVideos();
                loadTasks();

            },2000);
        };

        // Setup
        function setupUser(){

            if(!user) return;

            document.getElementById(
                'header-username'
            ).innerText = user.first_name;

            const avatar =
                `https://ui-avatars.com/api/?name=${user.first_name}&background=7C3AED&color=fff`;

            document.getElementById(
                'header-avatar'
            ).src = avatar;

            document.getElementById(
                'load-avatar'
            ).src = avatar;

            document
                .getElementById('header-avatar')
                .classList
                .remove('hidden');

            document
                .getElementById('load-avatar')
                .classList
                .remove('hidden');

            if(ADMIN_IDS.includes(user.id)){

                isAdmin = true;

                document
                    .getElementById('admin-badge')
                    .classList
                    .remove('hidden');

                document
                    .getElementById('page-admin')
                    .classList
                    .remove('hidden');

                addAdminTab();
            }
        }

        // Tabs
        function switchTab(tab){

            document.querySelectorAll('.page')
                .forEach(p => p.classList.remove('active'));

            document
                .getElementById(`page-${tab}`)
                .classList
                .add('active');

            document.querySelectorAll('nav button')
                .forEach(btn => {
                    btn.classList.remove(
                        'text-purple-400',
                        'text-blue-400'
                    );

                    btn.classList.add('text-slate-400');
                });

            document
                .getElementById(`tab-${tab}`)
                .classList
                .remove('text-slate-400');

            document
                .getElementById(`tab-${tab}`)
                .classList
                .add(
                    tab === 'tasks'
                    ? 'text-blue-400'
                    : 'text-purple-400'
                );

            if(tab === 'admin'){
                loadAdminData();
            }
        }

        // Add Admin Tab
        function addAdminTab(){

            const nav =
                document.querySelector('nav .flex');

            const btn =
                document.createElement('button');

            btn.id = 'tab-admin';

            btn.className =
                'flex flex-col items-center text-slate-400';

            btn.onclick = () => switchTab('admin');

            btn.innerHTML = `
                <span>⚙️</span>
                <span class="text-xs mt-1 font-semibold">
                    Admin
                </span>
            `;

            nav.appendChild(btn);
        }

        // Videos
        function loadVideos(){

            const container =
                document.getElementById('videos-container');

            container.innerHTML = '';

            videos.forEach(video => {

                const watched =
                    adProgress[video.unique_id] || 0;

                const unlocked =
                    watched >= video.ads_required;

                const percent =
                    Math.min(
                        (watched / video.ads_required) * 100,
                        100
                    );

                container.innerHTML += `
                    <div class="glass rounded-3xl overflow-hidden">

                        <div class="relative aspect-video">

                            <img
                                src="${video.image_url}"
                                class="w-full h-full object-cover"
                            >

                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>

                        </div>

                        <div class="p-4">

                            <h3 class="font-bold text-base">
                                ${video.title}
                            </h3>

                            ${
                                unlocked
                                ?
                                `
                                <button
                                    onclick="playVideo('${video.video_url}')"
                                    class="w-full mt-3 bg-green-600 py-3 rounded-2xl font-bold text-sm"
                                >
                                    ▶ Watch Video
                                </button>
                                `
                                :
                                `
                                <div class="mt-3">

                                    <div class="flex justify-between text-xs text-slate-400 mb-1">

                                        <span>
                                            Unlock ${watched}/${video.ads_required}
                                        </span>

                                        <span>
                                            ${Math.round(percent)}%
                                        </span>

                                    </div>

                                    <div class="bg-slate-700 h-2 rounded-full overflow-hidden">

                                        <div
                                            class="bg-gradient-to-r from-purple-500 to-blue-500 h-2 progress-fill"
                                            style="width:${percent}%"
                                        ></div>

                                    </div>

                                    <button
                                        onclick="watchAd('${video.unique_id}',${video.ads_required})"
                                        class="w-full mt-3 bg-purple-600 py-3 rounded-2xl font-bold text-sm"
                                    >
                                        Watch Ad
                                    </button>

                                </div>
                                `
                            }

                            <button
                                onclick="copyShareLink('${video.unique_id}')"
                                class="mt-3 text-xs text-slate-400"
                            >
                                🔗 Share
                            </button>

                        </div>

                    </div>
                `;
            });
        }

        // Tasks
        function loadTasks(){

            const container =
                document.getElementById('tasks-container');

            container.innerHTML = '';

            tasks.forEach(task => {

                container.innerHTML += `
                    <div class="glass rounded-2xl p-4 flex items-center gap-4">

                        <img
                            src="${task.image_url}"
                            class="w-16 h-16 rounded-xl object-cover"
                        >

                        <div class="flex-1">

                            <h3 class="font-semibold text-sm">
                                ${task.title}
                            </h3>

                            <a
                                href="${task.redirect_url}"
                                target="_blank"
                                class="inline-block mt-2 bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold"
                            >
                                Start Task
                            </a>

                        </div>

                    </div>
                `;
            });
        }

        // Watch Ad
        function watchAd(uniqueId, adsRequired){

            // PaidAdz Interstitial
            show_11007747({
                type:'inApp',
                inAppSettings:{
                    frequency:2,
                    capping:0.1,
                    interval:30,
                    timeout:5,
                    everyPage:false
                }
            });

            showToast('Watching Ad...');

            setTimeout(() => {

                adProgress[uniqueId] =
                    (adProgress[uniqueId] || 0) + 1;

                localStorage.setItem(
                    'adProgress',
                    JSON.stringify(adProgress)
                );

                if(
                    adProgress[uniqueId]
                    >=
                    adsRequired
                ){

                    showToast('🎉 Video Unlocked!');

                }else{

                    showToast('Ad Watched!');
                }

                loadVideos();

            },5000);
        }

        // Play Video
        function playVideo(url){

            tg.openLink(url);
        }

        // Share
        function copyShareLink(uniqueId){

            const link =
                `https://t.me/PaidAdzBot?startapp=video_${uniqueId}`;

            navigator.clipboard.writeText(link);

            showToast('Link Copied!');
        }

        // Toast
        function showToast(text){

            const toast =
                document.getElementById('toast');

            toast.innerText = text;

            toast.classList.add('show');

            setTimeout(() => {

                toast.classList.remove('show');

            },2000);
        }

        // Modal
        function openVideoModal(){

            document
                .getElementById('video-modal')
                .classList
                .add('show');
        }

        function closeVideoModal(){

            document
                .getElementById('video-modal')
                .classList
                .remove('show');
        }

        // Save Video
        function saveVideo(){

            const title =
                document.getElementById('vm-title').value;

            const img =
                document.getElementById('vm-img').value;

            const url =
                document.getElementById('vm-url').value;

            const ads =
                parseInt(
                    document.getElementById('vm-ads').value
                );

            if(!title || !url || !ads){

                showToast('Fill all fields');

                return;
            }

            videos.unshift({
                id:Date.now(),
                unique_id:Math.random()
                    .toString(36)
                    .substring(2,8),
                title,
                image_url:img,
                video_url:url,
                ads_required:ads
            });

            closeVideoModal();

            loadVideos();

            loadAdminData();

            showToast('Video Added!');
        }

        // Admin Data
        function loadAdminData(){

            const container =
                document.getElementById('admin-videos-list');

            container.innerHTML = '';

            videos.forEach(video => {

                container.innerHTML += `
                    <div class="glass rounded-2xl p-4 flex justify-between items-center">

                        <div class="truncate w-2/3 text-sm">
                            ${video.title}
                        </div>

                        <button
                            onclick="deleteVideo(${video.id})"
                            class="text-red-400 text-xs font-bold"
                        >
                            Delete
                        </button>

                    </div>
                `;
            });
        }

        // Delete
        function deleteVideo(id){

            videos =
                videos.filter(v => v.id !== id);

            loadVideos();

            loadAdminData();

            showToast('Deleted');
        }

    </script>

</body>
</html>
